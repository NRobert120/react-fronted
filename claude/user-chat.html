<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Support Chat</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4ff;
      --white: #ffffff;
      --primary: #4f46e5;
      --primary-light: #eef2ff;
      --primary-dark: #3730a3;
      --text: #1e1b4b;
      --muted: #9094a8;
      --border: #e2e5f1;
      --admin-bg: #ffffff;
      --user-bg: #4f46e5;
      --user-text: #ffffff;
      --shadow: 0 4px 24px rgba(79,70,229,0.10);
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 480px;
      height: 680px;
      background: var(--white);
      border-radius: 24px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* HEADER */
    .chat-header {
      background: var(--primary);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .header-info h2 {
      color: white;
      font-size: 1rem;
      font-weight: 700;
    }

    .header-info p {
      color: rgba(255,255,255,0.7);
      font-size: 0.75rem;
      margin-top: 2px;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      display: inline-block;
      margin-right: 5px;
      box-shadow: 0 0 6px #4ade80;
    }

    /* SETUP SCREEN */
    .setup-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      gap: 16px;
    }

    .setup-screen h3 {
      font-size: 1.1rem;
      color: var(--text);
      font-weight: 700;
    }

    .setup-screen p {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
    }

    .setup-screen input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      color: var(--text);
      transition: border-color 0.2s;
    }

    .setup-screen input:focus { border-color: var(--primary); }

    .btn-start {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-start:hover { background: var(--primary-dark); transform: translateY(-1px); }

    /* MESSAGES */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      display: none;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg-row {
      display: flex;
      flex-direction: column;
      animation: popIn 0.2s ease;
    }

    .msg-row.user { align-items: flex-end; }
    .msg-row.admin { align-items: flex-start; }

    .msg-bubble {
      max-width: 78%;
      padding: 11px 16px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg-row.user .msg-bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }

    .msg-row.admin .msg-bubble {
      background: var(--primary-light);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }

    .msg-meta {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    .system-msg {
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--bg);
      border-radius: 20px;
      padding: 5px 14px;
      align-self: center;
    }

    /* INPUT */
    .input-area {
      display: flex;
      gap: 10px;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      display: none;
    }

    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      color: var(--text);
      transition: border-color 0.2s;
    }
    .input-area input:focus { border-color: var(--primary); }

    .btn-send {
      width: 46px;
      height: 46px;
      background: var(--primary);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .btn-send:hover { background: var(--primary-dark); transform: scale(1.05); }
    .btn-send svg { fill: white; width: 20px; height: 20px; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.95) translateY(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <!-- Header -->
  <div class="chat-header">
    <div class="avatar">🎧</div>
    <div class="header-info">
      <h2>Support Team</h2>
      <p><span class="status-indicator"></span>Online — usually replies instantly</p>
    </div>
  </div>

  <!-- Setup Screen -->
  <div class="setup-screen" id="setupScreen">
    <div style="font-size:2.5rem">👋</div>
    <h3>Start a conversation</h3>
    <p>Enter your name and ID to connect with our support team</p>
    <input type="text" id="nameInput" placeholder="Your name (e.g. John)" />
    <input type="text" id="userIdInput" placeholder="Your user ID (e.g. user_123)" />
    <button class="btn-start" onclick="startChat()">Start Chat</button>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Input -->
  <div class="input-area" id="inputArea">
    <input type="text" id="msgInput" placeholder="Type your message..." onkeydown="if(event.key==='Enter') sendMessage()" />
    <button class="btn-send" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>

</div>

<script>
  const SERVER_URL = "http://localhost:4000";
  let socket = null;
  let currentUser = { id: "", name: "" };

  function startChat() {
    const name = document.getElementById("nameInput").value.trim();
    const userId = document.getElementById("userIdInput").value.trim();

    if (!name || !userId) return alert("Please enter your name and user ID");

    currentUser = { id: userId, name };

    // Connect socket
    socket = io(SERVER_URL, { transports: ["websocket", "polling"] });

    socket.on("connect", () => {
      socket.emit("joinRoom", currentUser.id);
      loadHistory();
      showChat();
      addSystemMsg("You are now connected to support 🎉");
    });

    socket.on("chatMessage", (data) => {
      if (data.sender === "user") return; // already shown optimistically
      addMessage(data, "admin");
    });

    socket.on("disconnect", () => {
      addSystemMsg("Disconnected from server");
    });
  }

  function showChat() {
    document.getElementById("setupScreen").style.display = "none";
    document.getElementById("messages").style.display = "flex";
    document.getElementById("inputArea").style.display = "flex";
  }

  async function loadHistory() {
    try {
      const res = await fetch(`${SERVER_URL}/messages/${currentUser.id}`);
      const messages = await res.json();
      messages.forEach(msg => addMessage(msg, msg.sender === "user" ? "user" : "admin", false));
      scrollBottom();
    } catch (e) {
      console.error("Failed to load history", e);
    }
  }

  function sendMessage() {
    const input = document.getElementById("msgInput");
    const message = input.value.trim();
    if (!message || !socket) return;

    const data = {
      roomId: currentUser.id,
      sender: "user",
      senderName: currentUser.name,
      message,
    };

    // Show optimistically
    addMessage({ ...data, timestamp: new Date() }, "user");
    socket.emit("chatMessage", data);
    socket.emit("notifyAdmin", { roomId: currentUser.id, senderName: currentUser.name });
    input.value = "";
  }

  function addMessage(data, type, scroll = true) {
    const messages = document.getElementById("messages");
    const row = document.createElement("div");
    row.className = `msg-row ${type}`;

    const time = new Date(data.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

    row.innerHTML = `
      <div class="msg-bubble">${escapeHtml(data.message)}</div>
      <div class="msg-meta">${type === "admin" ? "Support · " : ""}${time}</div>
    `;
    messages.appendChild(row);
    if (scroll) scrollBottom();
  }

  function addSystemMsg(text) {
    const messages = document.getElementById("messages");
    const el = document.createElement("div");
    el.className = "system-msg";
    el.textContent = text;
    messages.appendChild(el);
    scrollBottom();
  }

  function scrollBottom() {
    const messages = document.getElementById("messages");
    messages.scrollTop = messages.scrollHeight;
  }

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }
</script>
</body>
</html>
